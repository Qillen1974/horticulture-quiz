<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Horticulture Quiz - Learn Plants!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #276749;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .category-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #f0fff4;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            background: #c6f6d5;
            color: #276749;
        }

        .category-btn.active {
            background: #48bb78;
            color: white;
            transform: scale(1.05);
        }

        .quiz-area {
            padding: 25px;
        }

        .question-card {
            background: #f0fff4;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .question-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .question-text {
            font-size: 1.4rem;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .question-hint {
            font-size: 1rem;
            color: #718096;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }
            .match-container {
                flex-direction: column;
            }
            .match-column {
                width: 100% !important;
            }
        }

        .option-btn {
            padding: 15px;
            font-size: 1.1rem;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-weight: bold;
            color: #2d3748;
        }

        .option-btn:hover {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .option-btn.correct {
            border-color: #48bb78;
            background: #c6f6d5;
            color: #22543d;
        }

        .option-btn.incorrect {
            border-color: #f56565;
            background: #fed7d7;
            color: #742a2a;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            margin: 15px 0;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        .next-btn {
            display: block;
            margin: 15px auto;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .next-btn:hover {
            background: #38a169;
        }

        .score {
            text-align: center;
            font-size: 1.1rem;
            color: #718096;
            padding: 12px;
            background: #f7fafc;
            border-radius: 10px;
            margin-top: 15px;
        }

        .score-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #48bb78;
        }

        .explanation {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 12px;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95rem;
        }

        .explanation.show {
            display: block;
        }

        /* Match styles */
        .match-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .match-column {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-column h3 {
            text-align: center;
            color: #276749;
            margin-bottom: 5px;
        }

        .match-item {
            padding: 12px;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
            color: #2d3748;
            user-select: none;
        }

        .match-item:hover {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .match-item.selected {
            border-color: #4299e1;
            background: #ebf8ff;
            transform: scale(1.03);
        }

        .match-item.matched {
            border-color: #48bb78;
            background: #c6f6d5;
            cursor: default;
            opacity: 0.8;
        }

        .match-item.wrong {
            border-color: #f56565;
            background: #fed7d7;
            animation: shake 0.4s;
        }

        .match-item img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 6px;
            object-fit: contain;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .match-score {
            text-align: center;
            font-size: 1.3rem;
            color: #276749;
            font-weight: bold;
            margin: 15px 0;
        }

        .match-round-info {
            text-align: center;
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 15px;
        }

        /* Assessment styles */
        .assessment-intro {
            text-align: center;
            padding: 30px 20px;
        }

        .assessment-intro h2 {
            font-size: 1.6rem;
            color: #276749;
            margin-bottom: 15px;
        }

        .assessment-intro p {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .assessment-start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .assessment-start-btn:hover {
            background: #38a169;
            transform: scale(1.05);
        }

        .assessment-progress {
            text-align: center;
            margin-bottom: 15px;
        }

        .assessment-progress-text {
            font-size: 1.1rem;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        .assessment-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            margin: 15px 0;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .assessment-input:focus {
            outline: none;
            border-color: #48bb78;
        }

        .assessment-input.correct-border {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .assessment-input.incorrect-border {
            border-color: #f56565;
            background: #fff5f5;
        }

        .assessment-submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .assessment-submit-btn:hover {
            background: #3182ce;
        }

        .assessment-submit-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .model-answer {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .model-answer strong {
            color: #2b6cb0;
        }

        .self-assess-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }

        .self-assess-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.1rem;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .self-assess-btn.got-it {
            background: #c6f6d5;
            color: #22543d;
            border-color: #48bb78;
        }

        .self-assess-btn.got-it:hover {
            background: #9ae6b4;
        }

        .self-assess-btn.not-quite {
            background: #fed7d7;
            color: #742a2a;
            border-color: #f56565;
        }

        .self-assess-btn.not-quite:hover {
            background: #feb2b2;
        }

        .assessment-feedback {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .assessment-feedback.correct {
            background: #c6f6d5;
            color: #22543d;
        }

        .assessment-feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
        }

        .assessment-next-btn {
            display: block;
            margin: 15px auto;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .assessment-next-btn:hover {
            background: #38a169;
        }

        .results-summary {
            text-align: center;
            padding: 20px;
        }

        .results-summary h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .results-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
        }

        .results-score.pass {
            color: #48bb78;
        }

        .results-score.fail {
            color: #e53e3e;
        }

        .results-message {
            font-size: 1.2rem;
            color: #4a5568;
            margin: 15px 0;
            line-height: 1.5;
        }

        .results-percentage {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 20px;
        }

        .review-list {
            text-align: left;
            margin: 20px 0;
        }

        .review-list h3 {
            color: #276749;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .review-item {
            background: #fff5f5;
            border-left: 4px solid #f56565;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
        }

        .review-item .review-q {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .review-item .review-your {
            color: #742a2a;
        }

        .review-item .review-correct {
            color: #22543d;
            font-weight: bold;
        }

        .assessment-category-tag {
            display: inline-block;
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        
        /* Memory Practice styles */
        .memory-intro { text-align: center; padding: 30px 20px; }
        .memory-intro h2 { font-size: 1.6rem; color: #276749; margin-bottom: 15px; }
        .memory-intro p { font-size: 1.1rem; color: #4a5568; margin-bottom: 15px; line-height: 1.6; }
        .memory-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .memory-stat-card { background: #f0fff4; border: 2px solid #48bb78; border-radius: 12px; padding: 15px; text-align: center; }
        .memory-stat-number { font-size: 2rem; font-weight: bold; color: #276749; }
        .memory-stat-label { font-size: 0.9rem; color: #718096; margin-top: 5px; }
        .memory-start-btn { padding: 15px 40px; font-size: 1.2rem; background: #48bb78; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.3s; margin: 10px 5px; }
        .memory-start-btn:hover { background: #38a169; transform: scale(1.05); }
        .memory-start-btn.secondary { background: #4299e1; }
        .memory-start-btn.secondary:hover { background: #3182ce; }
        .memory-card { background: #f0fff4; border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .memory-question-text { font-size: 1.4rem; color: #2d3748; font-weight: bold; margin-bottom: 20px; }
        .memory-answer-box { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; margin: 15px 0; text-align: left; display: none; }
        .memory-answer-box.show { display: block; }
        .memory-answer-text { font-size: 1.1rem; color: #2d3748; line-height: 1.8; }
        .memory-answer-text ul { list-style: none; padding-left: 0; margin: 10px 0; }
        .memory-answer-text li { padding: 5px 0; padding-left: 25px; position: relative; }
        .memory-answer-text li:before { content: "•"; color: #48bb78; font-weight: bold; font-size: 1.5rem; position: absolute; left: 5px; top: -2px; }
        .memory-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .memory-btn { padding: 12px 25px; font-size: 1.1rem; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .memory-btn.show-answer { background: #4299e1; color: white; }
        .memory-btn.show-answer:hover { background: #3182ce; }
        .memory-btn.got-it { background: #48bb78; color: white; }
        .memory-btn.got-it:hover { background: #38a169; }
        .memory-btn.need-practice { background: #ed8936; color: white; }
        .memory-btn.need-practice:hover { background: #dd6b20; }
        .memory-btn.next { background: #48bb78; color: white; }
        .memory-btn.next:hover { background: #38a169; }
        .memory-progress { text-align: center; margin-bottom: 15px; }
        .memory-progress-text { font-size: 1.1rem; color: #4a5568; font-weight: bold; margin-bottom: 8px; }
        .memory-daily-goal { background: #ebf8ff; border-left: 4px solid #4299e1; padding: 12px; margin: 15px 0; border-radius: 0 8px 8px 0; font-size: 0.95rem; color: #2d3748; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 Horticulture Quiz</h1>
            <p>Learn about plants and gardening!</p>
        </div>

        <div class="category-selector">
            <button class="category-btn active" onclick="setCategory('tools', this)">🔧 Tools</button>
            <button class="category-btn" onclick="setCategory('toolparts', this)">🔩 Tool Parts</button>
            <button class="category-btn" onclick="setCategory('toolquality', this)">✅ Tool Quality</button>
            <button class="category-btn" onclick="setCategory('match', this)">🔗 Match Tools</button>
            <button class="category-btn" onclick="setCategory('propagation', this)">🌿 Propagation</button>
            <button class="category-btn" onclick="setCategory('media', this)">🪴 Soil Mix</button>
            <button class="category-btn" onclick="setCategory('matchmedia', this)">🔗 Match Media</button>
            <button class="category-btn" onclick="setCategory('plantcare', this)">🌱 Plant Care</button>
            <button class="category-btn" onclick="setCategory('safety', this)">⚠️ Safety</button>
            <button class="category-btn" onclick="setCategory('assessment', this)">📝 Assessment</button>
            <button class="category-btn" onclick="setCategory('memory', this)">📚 Memory Practice</button>
        </div>

        <!-- Standard quiz area -->
        <div class="quiz-area" id="quizArea">
            <div class="question-card">
                <img class="question-image" id="questionImage" style="display:none" alt="Question image">
                <div class="question-emoji" id="questionEmoji">✂️</div>
                <div class="question-text" id="questionText">What tool is this?</div>
                <div class="question-hint" id="questionHint">Select the correct answer!</div>
            </div>

            <div class="options" id="options"></div>

            <div class="explanation" id="explanation"></div>

            <div class="feedback" id="feedback"></div>

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">Next Question ➡️</button>

            <div class="score">
                <div>Score</div>
                <div class="score-number" id="scoreNumber">0</div>
                <div id="scoreText">Correct: 0 | Total: 0</div>
            </div>
        </div>

        <!-- Match area (shared by Match Tools and Match Media) -->
        <div class="quiz-area" id="matchArea" style="display: none;">
            <div class="match-round-info" id="matchRoundInfo">Round 1: Match each tool to its name</div>
            <div class="match-container" id="matchContainer"></div>
            <div class="match-score" id="matchScore"></div>
            <button class="next-btn" id="matchNextBtn" style="display: none;">Next Round ➡️</button>
            <button class="next-btn" id="matchRestartBtn" style="display: none;">Play Again 🔄</button>
        </div>

        <!-- Assessment area -->
        <div class="quiz-area" id="assessmentArea" style="display: none;"></div>
        
        <!-- Memory Practice area -->
        <div class="quiz-area" id="memoryArea" style="display: none;"></div>
    </div>

    <script>
        let currentCategory = 'tools';
        let score = { correct: 0, total: 0 };
        let currentQuestion = {};
        let answered = false;
        let askedQuestions = {}; // track asked question indices per category

        // Match state
        let matchSelectedLeft = null;
        let matchSelectedRight = null;
        let matchPairs = [];

        let activeMatchType = 'tools'; // 'tools' or 'media'

        const questions = {

        function setCategory(category, btnElement) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            btnElement.classList.add('active');

            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('matchArea').style.display = 'none';
            document.getElementById('assessmentArea').style.display = 'none';
            document.getElementById('memoryArea').style.display = 'none';

            if (category === 'assessment') {
                document.getElementById('assessmentArea').style.display = 'block';
                showAssessmentIntro();
            } else if (category === 'memory') {
                document.getElementById('memoryArea').style.display = 'block';
                showMemoryIntro();
            } else if (category === 'match' || category === 'matchmedia') {
                document.getElementById('matchArea').style.display = 'block';
                activeMatchType = category === 'match' ? 'tools' : 'media';
                startMatch();
            } else {
                document.getElementById('quizArea').style.display = 'block';
                newQuestion();
            }
        }

        function newQuestion() {
            const categoryQuestions = questions[currentCategory];

            // Reset pool if all questions have been asked
            if (!askedQuestions[currentCategory] || askedQuestions[currentCategory].length >= categoryQuestions.length) {
                askedQuestions[currentCategory] = [];
            }

            // Pick a random question that hasn't been asked yet
            const remaining = categoryQuestions
                .map((q, i) => i)
                .filter(i => !askedQuestions[currentCategory].includes(i));
            const pick = remaining[Math.floor(Math.random() * remaining.length)];
            askedQuestions[currentCategory].push(pick);
            currentQuestion = categoryQuestions[pick];
            answered = false;

            const emojiEl = document.getElementById('questionEmoji');
            const imageEl = document.getElementById('questionImage');

            if (currentQuestion.image) {
                emojiEl.style.display = 'none';
                imageEl.src = currentQuestion.image;
                imageEl.style.display = 'block';
            } else {
                emojiEl.style.display = 'block';
                emojiEl.textContent = currentQuestion.emoji;
                imageEl.style.display = 'none';
            }

            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('explanation').className = 'explanation';
            document.getElementById('nextBtn').style.display = 'none';

            let options = [...currentQuestion.options];
            let correctOption = options[0];
            options = shuffleArray(options);
            let correctIndex = options.indexOf(correctOption);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index, btn, correctIndex, optionsContainer);
                optionsContainer.appendChild(btn);
            });

            playSound('question');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function checkAnswer(selectedIndex, btn, correctIndex, container) {
            if (answered) return;
            answered = true;

            const buttons = container.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            score.total++;

            if (selectedIndex === correctIndex) {
                score.correct++;
                btn.classList.add('correct');
                document.getElementById('feedback').textContent = '🎉 Correct!';
                document.getElementById('feedback').className = 'feedback correct';
                playSound('correct');
            } else {
                btn.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct');
                document.getElementById('feedback').textContent = '❌ Not quite!';
                document.getElementById('feedback').className = 'feedback incorrect';
                playSound('incorrect');
            }

            document.getElementById('explanation').textContent = currentQuestion.explanation;
            document.getElementById('explanation').className = 'explanation show';

            document.getElementById('scoreNumber').textContent = score.correct;
            document.getElementById('scoreText').textContent = `Correct: ${score.correct} | Total: ${score.total}`;

            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            newQuestion();
        }

        // ========== Match (Tools & Media) ==========

        function getActiveMatchData() {
            return activeMatchType === 'tools' ? toolData : mediaData;
        }

        function startMatch() {
            matchRound = 1;
            matchCorrect = 0;
            matchTotal = 0;
            const nextBtn = document.getElementById('matchNextBtn');
            const restartBtn = document.getElementById('matchRestartBtn');
            nextBtn.style.display = 'none';
            restartBtn.style.display = 'none';
            nextBtn.onclick = () => { matchRound = 2; nextBtn.style.display = 'none'; buildMatchRound(); };
            restartBtn.onclick = () => startMatch();
            buildMatchRound();
        }

        function buildMatchRound() {
            matchSelectedLeft = null;
            matchSelectedRight = null;
            matchMatched = 0;

            const data = getActiveMatchData();
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';

            const label = activeMatchType === 'tools' ? 'tool' : 'media';
            const isRound1 = matchRound === 1;
            document.getElementById('matchRoundInfo').textContent = isRound1
                ? `Round 1: Match each ${label} to its name`
                : `Round 2: Match each ${label} to its function`;

            document.getElementById('matchScore').textContent = '';
            document.getElementById('matchNextBtn').style.display = 'none';
            document.getElementById('matchRestartBtn').style.display = 'none';

            const leftCol = document.createElement('div');
            leftCol.className = 'match-column';
            leftCol.innerHTML = `<h3>${activeMatchType === 'tools' ? 'Tools' : 'Media'}</h3>`;

            const rightCol = document.createElement('div');
            rightCol.className = 'match-column';
            rightCol.innerHTML = isRound1 ? '<h3>Names</h3>' : '<h3>Functions</h3>';

            const leftOrder = shuffleArray([...Array(data.length).keys()]);
            const rightOrder = shuffleArray([...Array(data.length).keys()]);

            matchPairs = data.map((t, i) => ({ index: i, matched: false }));

            leftOrder.forEach(i => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.dataset.index = i;
                item.dataset.side = 'left';
                item.innerHTML = `<img src="${data[i].image}" alt="${label}"><br><small>?</small>`;
                item.onclick = () => selectMatchItem(item);
                leftCol.appendChild(item);
            });

            rightOrder.forEach(i => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.dataset.index = i;
                item.dataset.side = 'right';
                item.textContent = isRound1 ? data[i].name : data[i].func;
                item.onclick = () => selectMatchItem(item);
                rightCol.appendChild(item);
            });

            container.appendChild(leftCol);
            container.appendChild(rightCol);
        }

        function selectMatchItem(item) {
            if (item.classList.contains('matched')) return;

            const side = item.dataset.side;
            const data = getActiveMatchData();

            if (side === 'left') {
                if (matchSelectedLeft) matchSelectedLeft.classList.remove('selected');
                matchSelectedLeft = item;
                item.classList.add('selected');
            } else {
                if (matchSelectedRight) matchSelectedRight.classList.remove('selected');
                matchSelectedRight = item;
                item.classList.add('selected');
            }

            if (matchSelectedLeft && matchSelectedRight) {
                const leftIndex = parseInt(matchSelectedLeft.dataset.index);
                const rightIndex = parseInt(matchSelectedRight.dataset.index);
                matchTotal++;

                if (leftIndex === rightIndex) {
                    matchCorrect++;
                    matchSelectedLeft.classList.remove('selected');
                    matchSelectedRight.classList.remove('selected');
                    matchSelectedLeft.classList.add('matched');
                    matchSelectedRight.classList.add('matched');
                    const label = matchSelectedLeft.querySelector('small');
                    if (label) label.textContent = data[leftIndex].name;
                    matchMatched++;
                    playSound('correct');

                    matchSelectedLeft = null;
                    matchSelectedRight = null;

                    if (matchMatched === data.length) {
                        document.getElementById('matchScore').textContent =
                            `Round ${matchRound} complete! ${matchCorrect}/${matchTotal} correct`;
                        if (matchRound === 1) {
                            document.getElementById('matchNextBtn').style.display = 'block';
                        } else {
                            document.getElementById('matchScore').textContent +=
                                ' — All done! Great work!';
                            document.getElementById('matchRestartBtn').style.display = 'block';
                        }
                    }
                } else {
                    playSound('incorrect');
                    matchSelectedLeft.classList.add('wrong');
                    matchSelectedRight.classList.add('wrong');
                    const left = matchSelectedLeft;
                    const right = matchSelectedRight;
                    setTimeout(() => {
                        left.classList.remove('selected', 'wrong');
                        right.classList.remove('selected', 'wrong');
                    }, 500);
                    matchSelectedLeft = null;
                    matchSelectedRight = null;
                }
            }
        }

        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (type === 'correct') {
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } else if (type === 'incorrect') {

        function checkFlexibleMatch(userAnswer, correctAnswer, acceptAlso) {
            if (!userAnswer || userAnswer.trim() === '') return false;

            const clean = str => str.toLowerCase().trim().replace(/[^a-z0-9\s:]/g, '').replace(/\s+/g, ' ');
            const userClean = clean(userAnswer);

            if (userClean === '') return false;

            // Check exact match with correct answer
            if (userClean === clean(correctAnswer)) return true;

            // Check against acceptAlso list
            if (acceptAlso) {
                for (const alt of acceptAlso) {
                    const altClean = clean(alt);
                    // User's answer matches an accepted alternative
                    if (userClean === altClean) return true;
                    // User's answer contains the alternative
                    if (userClean.includes(altClean)) return true;
                    // Alternative contains the user's answer (for partial matches like "trowel" matching "hand trowel")
                    if (altClean.includes(userClean) && userClean.length >= 3) return true;
                }
            }

            // Check if user answer contains key words from the correct answer
            const correctWords = clean(correctAnswer).split(' ').filter(w => w.length > 3);
            if (correctWords.length > 0) {
                const matchCount = correctWords.filter(w => userClean.includes(w)).length;
                if (matchCount >= Math.ceil(correctWords.length * 0.5)) return true;
            }

            return false;
        }

                    </div>
                </div>
                <div class="memory-card">
                    <span class="assessment-category-tag">${q.category}</span>
                    <div class="memory-question-text">${q.question}</div>
                    <div class="memory-answer-box" id="memoryAnswerBox">
                        <div class="memory-answer-text">${q.answer}</div>
                    </div>
                </div>
                <div class="memory-buttons" id="memoryButtons">
                    <button class="memory-btn show-answer" onclick="showMemoryAnswer()">Show Answer 👁️</button>
                </div>
                <div class="memory-buttons" id="memoryAssessButtons" style="display: none;">
                    <button class="memory-btn got-it" onclick="memoryAssess(true)">Got It ✅</button>
                    <button class="memory-btn need-practice" onclick="memoryAssess(false)">Need Practice 🔄</button>
                </div>
            `;
        }
        
        function showMemoryAnswer() {
            document.getElementById('memoryAnswerBox').classList.add('show');
            document.getElementById('memoryButtons').style.display = 'none';
            document.getElementById('memoryAssessButtons').style.display = 'flex';
        }
        
        function memoryAssess(gotIt) {
            const q = memoryState.questions[memoryState.currentIndex];
            
            if (gotIt) {
                // Add to mastered, remove from need practice
                if (!memoryState.mastered.includes(q.id)) {
                    memoryState.mastered.push(q.id);
                }
                memoryState.needPractice = memoryState.needPractice.filter(id => id !== q.id);
            } else {
                // Add to need practice
                if (!memoryState.needPractice.includes(q.id)) {
                    memoryState.needPractice.push(q.id);
                }
            }
            
            saveMemoryProgress();
            nextMemoryQuestion();
        }
        
        function nextMemoryQuestion() {
            memoryState.currentIndex++;
            if (memoryState.currentIndex >= memoryState.questions.length) {
                showMemoryResults();
            } else {
                showMemoryQuestion();
            }
        }
        
        function showMemoryResults() {
            const area = document.getElementById('memoryArea');
            const mastered = memoryState.mastered.length;
            const needPractice = memoryState.needPractice.length;
            const total = memoryPracticeQuestions.length;
            const pct = Math.round((mastered / total) * 100);
            
            let reviewHtml = '';
            if (needPractice > 0) {
                const reviewQuestions = memoryPracticeQuestions.filter(q => memoryState.needPractice.includes(q.id));
                reviewHtml = `
                    <div class="review-list">
                        <h3>Questions to Review (${needPractice})</h3>
                        ${reviewQuestions.map(q => `
                            <div class="review-item">
                                <div class="review-q">${q.question}</div>
                                <div class="memory-answer-text" style="margin-top: 8px;">${q.answer}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            area.innerHTML = `
                <div class="results-summary">
                    <h2>${pct >= 80 ? 'Excellent Work! 🎉' : pct >= 50 ? 'Good Progress! 👍' : 'Keep Practising! 💪'}</h2>
                    <div class="results-score" style="font-size: 3rem; color: ${pct >= 70 ? '#48bb78' : '#ed8936'};">${mastered}/${total}</div>
                    <div class="results-percentage">${pct}% Mastered</div>
                    <div class="results-message">
                        ${pct >= 80 
                            ? 'Amazing recall! You are well prepared for your oral assessment. Keep reviewing the remaining questions.'
                            : pct >= 50
                            ? 'You are making good progress! Focus on the questions marked "Need Practice" to improve your score.'
                            : 'Don\'t give up! Practice a few questions each day and you\'ll master them before March 25.'}
                    </div>
                    <div class="progress-bar" style="margin: 15px 0;">
                        <div class="progress-bar-fill" style="width: ${pct}%; background: ${pct >= 70 ? 'linear-gradient(90deg, #48bb78, #38a169)' : 'linear-gradient(90deg, #ed8936, #dd6b20)'}"></div>
                    </div>
                    ${reviewHtml}
                    <div class="memory-buttons" style="margin-top: 20px;">
                        <button class="memory-btn next" onclick="showMemoryIntro()">Back to Progress</button>
                        ${needPractice > 0 ? '<button class="memory-btn got-it" onclick="startMemoryReview()">Review Need Practice</button>' : ''}
                        ${pct < 100 ? '<button class="memory-btn show-answer" onclick="startMemoryPractice()">Continue Practice</button>' : ''}
                    </div>
                </div>
            `;
        }
        
        function resetMemoryProgress() {
            if (confirm('Are you sure you want to reset all progress? This will clear your mastered and need practice lists.')) {
                memoryState.mastered = [];
                memoryState.needPractice = [];
                saveMemoryProgress();
                showMemoryIntro();
            }
        }

        newQuestion();
    </script>
</body>
</html>
